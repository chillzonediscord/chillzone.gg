<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChillZone</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #d4d4d8; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { text-align: center; padding: 2rem; }
        h1 { color: #fff; font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #71717a; margin-bottom: 2rem; }
        .links a { color: #818cf8; text-decoration: none; margin: 0 1rem; font-size: 0.9rem; }
        .links a:hover { text-decoration: underline; }
        .discord { display: inline-block; background: #5865F2; color: white; padding: 0.75rem 2rem; border-radius: 8px; text-decoration: none; font-weight: 600; margin-bottom: 2rem; }
        .discord:hover { background: #4752C4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ChillZone</h1>
        <p>The chill corner of Discord</p>
        <a href="https://discord.gg/chillzone" class="discord">Join the Server</a>
        <div class="links">
            <a href="/tos">Terms of Service</a>
            <a href="/privacy">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
